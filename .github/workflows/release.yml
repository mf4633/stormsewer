# SPDX-License-Identifier: GPL-3.0-or-later
# Cut a release on tag push (e.g. `git tag v0.7.0 && git push origin v0.7.0`):
# builds the Linux desktop app + CLI, the Windows app + signed installer, a macOS
# universal .app + CLI, and the WASM web bundle, then attaches them all to a
# GitHub Release.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System deps for the desktop app (eframe + rfd)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Build app + CLI
        run: cargo build --release -p stormsewer-app -p stormsewer
      - name: Package (CLI + app tarballs)
        run: |
          mkdir -p dist
          tar -czf dist/stormsewer-cli-linux-x64.tar.gz -C target/release stormsewer-cli
          tar -czf dist/StormSewer-linux-x64.tar.gz -C target/release StormSewer
      - name: Build self-contained AppImage (one-click Linux)
        run: |
          export APPIMAGE_EXTRACT_AND_RUN=1
          export OUTPUT=StormSewer-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp target/release/StormSewer AppDir/usr/bin/StormSewer
          base=https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous
          wget -qO linuxdeploy "$base/linuxdeploy-x86_64.AppImage"
          wget -qO linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk
          ./linuxdeploy --appdir AppDir --plugin gtk \
            --desktop-file installer/StormSewer.desktop \
            --icon-file installer/stormsewer.png \
            --executable AppDir/usr/bin/StormSewer \
            --output appimage
          mv StormSewer-x86_64.AppImage dist/
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  windows:
    runs-on: windows-latest
    env:
      # Present only if the repo has the signing secret configured.
      CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build app + CLI
        run: cargo build --release -p stormsewer-app -p stormsewer
      - name: Code sign (optional — needs CERT_PFX_BASE64 + CERT_PASSWORD secrets)
        if: ${{ env.CERT_PFX_BASE64 != '' }}
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT_PFX_BASE64))
          & signtool sign /f cert.pfx /p $env:CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 target/release/StormSewer.exe
      - name: Build installer (Inno Setup)
        run: iscc installer\stormsewer.iss
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/*.exe }

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build universal (Apple Silicon + Intel)
        run: |
          cargo build --release -p stormsewer-app -p stormsewer --target aarch64-apple-darwin
          cargo build --release -p stormsewer-app -p stormsewer --target x86_64-apple-darwin
      - name: Assemble .app bundle and package
        run: |
          mkdir -p dist "StormSewer.app/Contents/MacOS" "StormSewer.app/Contents/Resources"
          cp installer/Info.plist StormSewer.app/Contents/Info.plist
          lipo -create -output StormSewer.app/Contents/MacOS/StormSewer \
            target/aarch64-apple-darwin/release/StormSewer \
            target/x86_64-apple-darwin/release/StormSewer
          zip -r dist/StormSewer-macos-universal.zip StormSewer.app
          lipo -create -output stormsewer-cli \
            target/aarch64-apple-darwin/release/stormsewer-cli \
            target/x86_64-apple-darwin/release/stormsewer-cli
          tar -czf dist/stormsewer-cli-macos.tar.gz stormsewer-cli
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/* }

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.95
      - name: Build web bundle
        run: ./wasm/build.sh
      - name: Package
        run: |
          mkdir -p dist
          cp wasm/index.html wasm/pkg/
          (cd wasm && zip -r ../dist/stormsewer-web.zip pkg)
      - uses: actions/upload-artifact@v4
        with: { name: wasm, path: dist/* }

  release:
    needs: [linux, macos, windows, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
