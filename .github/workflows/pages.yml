# SPDX-License-Identifier: GPL-3.0-or-later
# Build the WASM web demo and publish it to GitHub Pages on every push to master.
# The result is the zero-install "web wedge" — a live URL anyone can open.
name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-bindgen-cli --version 0.2.95
      - run: ./wasm/build.sh
      - name: Assemble site
        run: |
          mkdir -p site
          cp wasm/index.html site/
          cp -r wasm/pkg site/pkg
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
